name: Sync install.sh from Sentinal

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest install.sh from SahilSidhu7/Sentinal
        run: |
          curl -fsSL "https://raw.githubusercontent.com/SahilSidhu7/Sentinal/main/scripts/install.sh" -o /tmp/install.sh

      - name: Diff against current public/install.sh
        id: diff
        run: |
          if diff -q /tmp/install.sh public/install.sh > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get upstream short SHA
        if: steps.diff.outputs.changed == 'true'
        id: upstream
        run: |
          sha=$(git ls-remote https://github.com/SahilSidhu7/Sentinal.git main | cut -c1-7)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated install.sh
        if: steps.diff.outputs.changed == 'true'
        run: |
          cp /tmp/install.sh public/install.sh
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/install.sh
          git commit -m "sync install.sh from SahilSidhu7/Sentinal@${{ steps.upstream.outputs.sha }}"
          git push

      - name: Trigger Pages deploy
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run deploy.yml --ref main

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "public/install.sh already matches upstream — nothing to do."
